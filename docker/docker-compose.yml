version: "3.9"

services:
  borsabot:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    volumes:
      - ../borsabot.db:/app/borsabot.db
      - ../.env:/app/.env:ro
    expose:
      - "8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ../frontend/dist:/usr/share/nginx/html:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - borsabot
    restart: unless-stopped
